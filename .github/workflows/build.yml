name: Build

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:        #permite ejecucuon manual del workflow desde la pestaña de Actions en GitHub
    inputs:
      build_configuration:
        description: 'Build configuration (Debug or Release)'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      log_level:
        description: 'dotnet verbosity level'
        required: false
        default: 'normal'
        type: choice
        options:
          - quiet
          - minimal
          - normal
          - detailed

env: 
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: ${{ github.event.inputs.build_configuration }}
  LOG_LEVEL: ${{ github.event.inputs.log_level }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Mensaje Inicial
      run: echo "Iniciando Workflow de CI"

    - name:  Checkout del Código
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Dependencies
      run: dotnet restore src/Api/Api.csproj --verbosity ${{ env.LOG_LEVEL || 'normal' }}

    - name: Build del proyecto
      id: build-step
      # working-directory: src/Api
      run: |
        CONFIG=${{ env.BUILD_CONFIGURATION || 'Release' }} 
        echo "Building with configuration: $CONFIG"
        dotnet build src/Api/Api.csproj --configuration $CONFIG --no-restore